<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta charset="UTF-8" />
  <title>متجر Neostore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="logo-area">
      <a href="index.html" class="logo-link">
        <img src="assets/logo.png" alt="شعار متجر Neostore" class="logo-img" />
        <span class="logo-text">متجر Neostore</span>
      </a>
    </div>

    <div class="header-actions">
      <button class="lang-toggle" data-lang="ar">العربية</button>
      <button class="lang-toggle" data-lang="en">EN</button>

      <a href="https://wa.me/96894390492" target="_blank" class="whatsapp-btn">
        تواصل واتساب
      </a>

      <a href="https://instagram.com/neostore.om" target="_blank" class="instagram-btn">
        انستغرام
      </a>

      <a href="cart.html" class="cart-link">
        🛒 <span id="cart-count">0</span>
      </a>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 data-i18n-ar="مرحباً بك في متجر Neostore" data-i18n-en="Welcome to Neostore store">مرحباً بك في متجر Neostore</h1>
      <p data-i18n-ar="اختر القسم المناسب وتصفح المنتجات" data-i18n-en="Choose a category and browse products">
        اختر القسم المناسب وتصفح المنتجات
      </p>
    </section>

    <section class="categories-section">
      <h2 data-i18n-ar="الأقسام" data-i18n-en="Categories">الأقسام</h2>
      <div id="categories-grid" class="categories-grid"></div>
    </section>
  </main>

  <footer class="main-footer">
    <p>© <span id="year"></span> متجر Neostore</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
