<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="assets/logo.svg">
  <meta charset="UTF-8" />
  <title>Neostore - Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header class="main-header">
  <div class="logo-area">
    <a href="index.html" class="logo-link">
      <img src="assets/logo.svg" alt="شعار Neostore" class="logo-img" />
      <span class="logo-text">متجر Neostore</span>
    </a>
  </div>

  <div class="header-actions">
    <a href="#" id="whatsappBtn" target="_blank" class="whatsapp-btn">تواصل واتساب</a>
    <a href="#" id="instagramBtn" target="_blank" class="instagram-btn">انستغرام</a>
    <button class="lang-toggle active" data-lang="ar">العربية</button>
    <button class="lang-toggle" data-lang="en">EN</button>
    <a href="cart.html" class="cart-link">🛒 <span id="cart-count">0</span></a>
  </div>
</header>

<main class="container">
  <section class="cart-section">
    <h1>السلة</h1>
    <div id="cart-empty" class="empty-text" style="display:none">السلة فارغة</div>
    <div id="cart-items"></div>
    <div id="cart-summary" class="cart-summary" style="display:none">
      <label class="modal-options label">
        <input id="agreeTerms" type="checkbox" />
        <span>أوافق على تفاصيل الطلب قبل الإرسال</span>
      </label>
      <div id="agreementError" style="display:none;color:#ff9696;font-size:.85rem;margin:.35rem 0;">يجب الموافقة أولًا</div>
      <div class="cart-total-row">
        <strong>الإجمالي</strong>
        <strong id="cart-total">0.000 ر.ع</strong>
      </div>
      <button id="checkout-btn" class="btn-primary">إتمام الطلب عبر واتساب</button>
    </div>
  </section>
</main>

<footer class="main-footer">
  <p>© <span id="year"></span> Neostore</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
